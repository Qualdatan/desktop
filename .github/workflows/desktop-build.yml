# SPDX-License-Identifier: AGPL-3.0-only
#
# Desktop installer build: compiles the Python sidecar with PyInstaller,
# drops it into ``src-tauri/binaries/`` under Tauri's required
# target-triple filename, then runs ``tauri build`` to produce an NSIS
# installer (.exe) and — bei gesetzten Updater-Secrets — eine Tauri-
# Updater-Signatur (.sig). Beide Artefakte plus ein generiertes
# ``latest.json`` werden auf Tag-Push als GitHub-Release hochgeladen.
#
# NOTE on location: this workflow lives inside the *desktop* submodule
# (``repos/desktop/.github/workflows/``). On push to the desktop repo it
# therefore checks out the desktop repo directly -- paths below are
# relative to the desktop repo root (e.g. ``sidecar/`` not
# ``repos/desktop/sidecar/``). The existing ``sidecar-ci.yml`` and
# ``docs.yml`` use the same convention.
#
# The umbrella repo does not trigger this workflow; releases are cut from
# the desktop submodule's own tags.
#
# Required GitHub-Secrets (fuer Phase 2 / Updater):
#   TAURI_SIGNING_PRIVATE_KEY           — Inhalt von ~/.tauri/qualdatan.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — Passphrase zu obigem Key

name: desktop-build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # TODO: add ``windows-11-arm`` (or equivalent GH-hosted ARM64 runner)
        # once available; Tauri target triple is
        # ``aarch64-pc-windows-msvc``.
        os: [windows-latest]
    runs-on: ${{ matrix.os }}

    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20 (with pnpm cache)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: sidecar/pyproject.toml

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # Caches Cargo registry/git + src-tauri/target keyed on Cargo.lock.
      # First run still cold (~6 min); subsequent ~2 min.
      - name: Cache Cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # NSIS toolchain + nsis-tauri-utils.dll get downloaded by tauri-bundler
      # on every fresh runner; cache them too.
      - name: Cache Tauri bundler downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/tauri
            ~/.cache/tauri
          key: tauri-bundler-${{ runner.os }}-v1

      # -----------------------------------------------------------------
      # Sidecar: build single-file PyInstaller binary
      # -----------------------------------------------------------------
      # qualdatan-core / qualdatan-plugins are workspace siblings under the
      # umbrella but unavailable in the standalone desktop checkout. We
      # bypass `uv sync` and install everything explicitly from git so
      # pyproject.toml stays workspace-friendly.
      - name: Sidecar -- create venv + install (git deps)
        working-directory: sidecar
        shell: pwsh
        run: |
          uv venv
          uv pip install `
            git+https://github.com/Qualdatan/core.git@main `
            git+https://github.com/Qualdatan/plugins.git@main `
            "fastapi>=0.115" `
            "uvicorn[standard]>=0.30" `
            "pydantic>=2" `
            "sse-starlette>=2.1" `
            "pyinstaller>=6.8" `
            -e .

      # `uv run` would resync against pyproject.toml (which lists
      # qualdatan-core unresolvable outside the umbrella workspace).
      # Invoke PyInstaller via the venv interpreter directly.
      - name: Sidecar -- PyInstaller build
        working-directory: sidecar
        shell: pwsh
        run: .venv\Scripts\python.exe -m PyInstaller qualdatan_sidecar.spec --noconfirm --clean

      - name: Sidecar -- place binary under Tauri externalBin path
        shell: pwsh
        run: |
          $bin = "sidecar/dist/qualdatan-sidecar.exe"
          if (-not (Test-Path $bin)) {
            Write-Error "Expected PyInstaller output $bin not found"
            exit 1
          }
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries" | Out-Null
          # Tauri v2 resolves externalBin "binaries/qualdatan-sidecar" to
          # "binaries/qualdatan-sidecar-<rust target triple>(.exe)".
          Copy-Item $bin "src-tauri/binaries/qualdatan-sidecar-x86_64-pc-windows-msvc.exe" -Force

      # -----------------------------------------------------------------
      # Frontend + Tauri bundle (NSIS)
      # -----------------------------------------------------------------
      - name: Frontend -- pnpm install
        run: pnpm install --frozen-lockfile=false

      - name: Frontend -- generate typed sidecar client
        run: pnpm gen:sidecar

      - name: Tauri build (NSIS + Updater signature)
        run: pnpm tauri build

      # -----------------------------------------------------------------
      # Collect artifacts: installer .exe + updater .sig
      # -----------------------------------------------------------------
      - name: Collect release artifacts
        id: collect
        shell: pwsh
        run: |
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          if (-not (Test-Path $nsisDir)) {
            Write-Error "NSIS bundle directory not found: $nsisDir"
            exit 1
          }
          $exe = Get-ChildItem "$nsisDir/*.exe" | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No NSIS .exe produced in $nsisDir"
            exit 1
          }
          $sig = Get-ChildItem "$nsisDir/*.exe.sig" -ErrorAction SilentlyContinue | Select-Object -First 1

          $outDir = "release-assets"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          Copy-Item $exe.FullName "$outDir/"
          if ($sig) { Copy-Item $sig.FullName "$outDir/" }

          "installer_name=$($exe.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_path=$outDir/$($exe.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          if ($sig) {
            "signature_path=$outDir/$($sig.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "signature_path=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Generate latest.json (Tauri updater manifest)
        if: startsWith(github.ref, 'refs/tags/v') && steps.collect.outputs.signature_path != ''
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $installer = "${{ steps.collect.outputs.installer_name }}"
          $sigPath = "${{ steps.collect.outputs.signature_path }}"
          $signature = Get-Content $sigPath -Raw
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $notes = ""
          try {
            $notes = (git tag -l --format='%(contents)' $tag) -join "`n"
          } catch { $notes = "" }

          $manifest = [ordered]@{
            version   = $version
            notes     = $notes
            pub_date  = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url       = "https://github.com/Qualdatan/desktop/releases/download/$tag/$installer"
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 5 | Out-File -FilePath "release-assets/latest.json" -Encoding utf8

      # -----------------------------------------------------------------
      # Artifacts (CI) + GitHub Release upload (Tag push)
      # -----------------------------------------------------------------
      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: qualdatan-desktop-${{ matrix.os }}-nsis
          path: release-assets/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            release-assets/*.exe
            release-assets/*.exe.sig
            release-assets/latest.json
